# Uncomment these two lines to add support for encoders to your firmware
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Habilitar Bluetooth
CONFIG_BT=y

# Configurar ZMK como teclado Bluetooth
CONFIG_ZMK_BLE=y

# Nombre del dispositivo Bluetooth
CONFIG_BT_DEVICE_NAME="David Keyboard"

# Número máximo de dispositivos emparejados
CONFIG_BT_MAX_PAIRED=3
CONFIG_BT_MAX_CONN=6

# Servicio de batería (opcional pero recomendado)
CONFIG_BT_BAS=y

# Guardar perfiles emparejados
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y

# Habilitar comandos para cambiar de perfil Bluetooth
# Puedes asignar las teclas para seleccionar perfiles, moverte al siguiente o al anterior
# Ejemplo: &bt BT_SEL 0, &bt BT_NXT, &bt BT_PRV en tu keymap

# Configuraciones adicionales
CONFIG_BT_GATT_CLIENT=y

# Habilitar acciones de ratón usadas en el keymap (&mkp)
CONFIG_ZMK_POINTING=y

# Ahorro de batería: dormir tras 5 minutos sin actividad
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Intervalo BLE equilibrado para escritura normal
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=16
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
